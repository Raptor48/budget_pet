<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <filter id="n">
    <!-- Slightly lower baseFrequency than 0.9 so the grain reads on screen (was very fine / muddy). -->
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" seed="3" stitchTiles="stitch" />
    <feColorMatrix values="0 0 0 0 0.09
                           0 0 0 0 0.09
                           0 0 0 0 0.12
                           0 0 0 1 0" />
  </filter>
  <rect width="100%" height="100%" filter="url(#n)" />
</svg>
